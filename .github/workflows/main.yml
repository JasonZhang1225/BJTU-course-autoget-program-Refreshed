name: Build/release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
          os: [windows-latest, macos-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: setup python 3.12
        uses: actions/setup-python@v2
        with:
          python-version: 3.12

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: "yarn"

      - name: Install UPX (Windows only)
        if: runner.os == 'Windows'
        uses: crazy-max/ghaction-upx@v3
        with:
          install-only: true

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          cd python
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ "$RUNNER_OS" == "Windows" ]; then
            pyinstaller --noconfirm --clean bjtupythonstub.spec
            cp -r dist/bjtupythonstub.exe ../src
          else
            pyinstaller --noconfirm --clean --onefile --target-arch arm64 \
              --name bjtupythonstub-mac bjtupythonstub.py
            cp dist/bjtupythonstub-mac ../src/bjtupythonstub-mac
          fi

      - name: Build/release Electron app
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.github_token }}
          release: false
          build_script_name: ${{ runner.os == 'macOS' && 'dist:mac' || 'dist' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ runner.os == 'macOS' && 'false' || 'true' }}

      - name: Upload Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          path: ${{ runner.os == 'macOS' && 'dist/*.dmg' || 'dist/*.exe' }}

      - name: Create Release (Windows only)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.exe
            dist/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
